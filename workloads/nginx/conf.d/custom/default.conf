server {
    include /etc/nginx/conf.d/setup-ssl.inc;

    server_name prowlarr.*;

    resolver 127.0.0.11;
    set $target "http://prowlarr:9696";

    location / {
        auth_request /internal-oauth2-auth;
        error_page 401 = @error401;

        proxy_pass $target;
    }

    include /etc/nginx/conf.d/auth-routes.inc;
}

