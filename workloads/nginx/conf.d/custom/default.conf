# Protected services — just add `include /etc/nginx/conf.d/auth.inc;`
server {
    include /etc/nginx/conf.d/setup-ssl.inc;
    include /etc/nginx/conf.d/auth.inc;
    server_name prowlarr.*;
    resolver 127.0.0.11;
    set $target "http://prowlarr:9696";

    location / {
