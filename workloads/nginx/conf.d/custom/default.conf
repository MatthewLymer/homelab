server {
    listen 80;
    return 302 https://$host$request_uri;
}

server {
    include /etc/nginx/conf.d/setup-ssl.inc;
    server_name default;
    return 404;
}

server {
    include /etc/nginx/conf.d/setup-ssl.inc;
    server_name status.*;
    default_type text/plain;
    add_header Cache-Control "no-store";
    return 200 "OK";
}

# oauth2-proxy (handles login/callback/validate)
server {
    include /etc/nginx/conf.d/setup-ssl.inc;
    server_name auth.*;
    resolver 127.0.0.11;
    set $target "http://oauth2-proxy:4180";

    location / {
        proxy_pass $target;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Scheme $scheme;
    }
}

# Public services
server {
    include /etc/nginx/conf.d/setup-ssl.inc;
    server_name budget.*;
    resolver 127.0.0.11;
    set $target "http://actual:5006";

    location / {
        proxy_pass $target;
    }
}

