server {
    listen 80;
    return 302 https://$host$request_uri;
}

server {
    include /etc/nginx/conf.d/setup-ssl.inc;

    server_name default;

    return 404;
}

server {
    include /etc/nginx/conf.d/setup-ssl.inc;

    server_name status.*;

    default_type text/plain;

    add_header Cache-Control "no-store";

    return 200 "OK";
}

server {
    include /etc/nginx/conf.d/setup-ssl.inc;

    server_name budget.*;

    resolver 127.0.0.11;
    set $target "http://actual:5006";

    location / {
        proxy_pass $target;
    }
}

server {
    include /etc/nginx/conf.d/setup-ssl.inc;

    server_name media.*;

    resolver 127.0.0.11;
    set $target "http://jellyfin:8096";

    location / {
        proxy_pass $target;
    }
}

server {
    include /etc/nginx/conf.d/setup-ssl.inc;

    server_name auth.*;

    resolver 127.0.0.11;
    set $oauth2proxy "http://oauth2-proxy:4180";

    location / {
        proxy_pass $oauth2proxy;
    }
}

server {
    include /etc/nginx/conf.d/setup-ssl.inc;

    server_name sonarr.*;

    resolver 127.0.0.11;
    set $target "http://sonarr:8989";
    set $oauth2proxy "http://oauth2-proxy:4180";

    location / {
        auth_request /internal-oauth2-auth;
        error_page 401 = @error401;
        proxy_pass $target;
    }

    location = /internal-oauth2-auth {
        internal;
        proxy_pass $oauth2proxy/oauth2/auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    location @error401 {
        return 302 https://auth.lymer.ca/oauth2/sign_in?rd=https://$host$request_uri;
    }
}

